<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TodoCamping — Asistente IA</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Agent theme — updated dynamically via JS */
      --agent-primary: #1e40af;
      --agent-light:   #eff6ff;
      --agent-dark:    #1e3a8a;
      /* Fixed */
      --gray-bg:      #f4f6f8;
      --gray-border:  #dde1e7;
      --gray-text:    #6b7280;
      --white:        #ffffff;
      --radius:       18px;
      --shadow:       0 4px 24px rgba(0,0,0,.12);
      --font:         'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      font-family: var(--font);
      background: transparent;
      margin: 0; padding: 0;
    }

    /* ── Widget flotante ────────────────────────────────────────── */
    #chat-widget {
      position: fixed;
      bottom: 24px; right: 24px;
      width: 400px; height: 680px;
      background: var(--white);
      border-radius: 20px;
      box-shadow: var(--shadow);
      display: flex; flex-direction: column;
      overflow: hidden;
      z-index: 9999;
      transition: opacity .25s, transform .25s;
    }
    #chat-widget.tc-hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(16px);
    }

    /* ── Botón burbuja (cuando el chat está cerrado) ─────────────── */
    #chat-bubble {
      position: fixed;
      bottom: 24px; right: 24px;
      width: 62px; height: 62px;
      background: var(--agent-primary);
      color: var(--white);
      border: none; border-radius: 50%;
      cursor: pointer; font-size: 26px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,.28);
      z-index: 9998;
      transition: background .3s, transform .15s;
    }
    #chat-bubble:hover { transform: scale(1.07); }
    #chat-bubble.tc-hidden { display: none; }

    /* ── Botón cerrar en el header ──────────────────────────────── */
    .header-close {
      background: none; border: none;
      color: var(--white); font-size: 18px;
      cursor: pointer; opacity: .75; padding: 0 0 0 6px; line-height: 1;
      flex-shrink: 0;
    }
    .header-close:hover { opacity: 1; }

    /* ── Header ─────────────────────────────────────────────────── */
    #chat-header {
      background: var(--agent-primary);
      color: var(--white);
      padding: 14px 18px;
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
      transition: background .4s ease;
    }

    .header-avatar {
      width: 42px; height: 42px;
      background: var(--agent-dark);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700;
      flex-shrink: 0;
      transition: background .4s ease;
    }

    .header-info { flex: 1; }
    .header-info strong { display: block; font-size: 15px; }
    .header-info span   { font-size: 12px; opacity: .8; }

    .status-dot {
      width: 9px; height: 9px;
      background: #4ade80;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.3);
      flex-shrink: 0;
    }

    /* ── Messages ───────────────────────────────────────────────── */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex; flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-thumb { background: var(--gray-border); border-radius: 4px; }

    /* ── Bubbles ────────────────────────────────────────────────── */
    .msg-row {
      display: flex; gap: 8px;
      max-width: 86%;
    }
    .msg-row.user  { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.agent { align-self: flex-start; }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      flex-shrink: 0; align-self: flex-end;
    }
    .msg-avatar[data-agent="leo"]      { background: #dbeafe; color: #1e40af; }
    .msg-avatar[data-agent="cami"]     { background: #e8f5ee; color: #2d7a4f; }
    .msg-avatar[data-agent="reservas"] { background: #fef3c7; color: #b45309; }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .msg-row.user .bubble {
      background: var(--agent-primary);
      color: var(--white);
      border-bottom-right-radius: 4px;
      transition: background .4s ease;
    }

    .msg-row.agent .bubble {
      background: var(--white);
      color: #1f2937;
      border: 1px solid var(--gray-border);
      border-bottom-left-radius: 4px;
    }

    /* Markdown básico en burbujas */
    .bubble table { border-collapse: collapse; font-size: 13px; margin-top: 6px; width: 100%; }
    .bubble th, .bubble td { border: 1px solid var(--gray-border); padding: 4px 8px; text-align: left; }
    .bubble th { background: var(--agent-light); font-weight: 600; }
    .bubble strong { font-weight: 600; }
    .bubble em { font-style: italic; }

    /* ── Handoff event ──────────────────────────────────────────── */
    .handoff-event {
      align-self: center;
      background: var(--gray-bg);
      border: 1px solid var(--gray-border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      color: var(--gray-text);
    }

    /* ── Typing indicator ───────────────────────────────────────── */
    #typing-indicator {
      display: none;
      align-self: flex-start;
      padding: 10px 14px;
      background: var(--white);
      border: 1px solid var(--gray-border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      gap: 4px; align-items: center;
    }
    #typing-indicator.visible { display: flex; }
    .dot {
      width: 7px; height: 7px;
      background: var(--gray-text);
      border-radius: 50%;
      animation: bounce .9s infinite;
    }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

    /* ── Input ──────────────────────────────────────────────────── */
    #chat-input-area {
      padding: 12px 14px;
      border-top: 1px solid var(--gray-border);
      display: flex; gap: 8px;
      flex-shrink: 0;
      background: var(--white);
    }

    #user-input {
      flex: 1;
      border: 1px solid var(--gray-border);
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: var(--font);
      outline: none;
      transition: border-color .2s;
    }
    #user-input:focus { border-color: var(--agent-primary); }

    #send-btn {
      background: var(--agent-primary);
      color: var(--white);
      border: none; border-radius: 50%;
      width: 40px; height: 40px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .4s ease;
    }
    #send-btn:hover    { filter: brightness(.9); }
    #send-btn:disabled { background: var(--gray-border); cursor: not-allowed; }
    #send-btn svg { width: 17px; height: 17px; }

    /* ── Error ──────────────────────────────────────────────────── */
    .error-banner {
      background: #fef2f2; color: #dc2626;
      border: 1px solid #fecaca; border-radius: 10px;
      padding: 10px 14px; font-size: 13px;
      align-self: center; max-width: 90%; text-align: center;
    }

    /* ── Config panel ───────────────────────────────────────────── */
    #config-panel {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
    }
    #config-panel.hidden { display: none; }

    #config-box {
      background: var(--white); border-radius: 16px;
      padding: 26px; max-width: 400px; width: 100%;
      box-shadow: var(--shadow);
    }
    #config-box h2 { font-size: 17px; color: #1e40af; margin-bottom: 4px; }
    #config-box p  { font-size: 13px; color: var(--gray-text); margin-bottom: 18px; line-height: 1.5; }

    .config-field { margin-bottom: 12px; }
    .config-field label {
      display: block; font-size: 12px; font-weight: 600;
      margin-bottom: 4px; color: #374151;
    }
    .config-field input {
      width: 100%; border: 1px solid var(--gray-border);
      border-radius: 8px; padding: 9px 12px;
      font-size: 13px; font-family: var(--font); outline: none;
    }
    .config-field input:focus { border-color: #1e40af; }
    .config-note { font-size: 11px; color: var(--gray-text); margin-top: 3px; }

    #config-save {
      width: 100%; background: #1e40af; color: var(--white);
      border: none; border-radius: 10px; padding: 11px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      font-family: var(--font); transition: background .2s; margin-top: 4px;
    }
    #config-save:hover { background: #1e3a8a; }

    .demo-badge {
      display: inline-block;
      background: #fef3c7; color: #b45309;
      font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 20px;
      margin-left: 6px; vertical-align: middle;
    }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 520px) {
      #chat-widget {
        bottom: 0; right: 0;
        width: 100%; height: 92dvh;
        border-radius: 20px 20px 0 0;
      }
      #chat-bubble { bottom: 16px; right: 16px; }
    }
  </style>
</head>

/* ═══════════════════════════════════════════════════════════════════
   VALIDADORES DE DATOS
═══════════════════════════════════════════════════════════════════ */
function validarEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(String(email).trim());
}

function validarTelefono(tel) {
  const digits = String(tel).replace(/[\s\-\+\(\)\.]/g, '');
  return digits.length >= 7 && digits.length <= 15 && /^\d+$/.test(digits);
}
function mensajeErrorTelefono(tel) {
  const digits = String(tel).replace(/[\s\-\+\(\)\.]/g, '');
  if (digits.length < 7)  return `Teléfono demasiado corto (${digits.length} dígitos). Debe tener entre 7 y 15 dígitos. Ejemplo: +5491112345678 o 099123456.`;
  if (digits.length > 15) return `Teléfono demasiado largo (${digits.length} dígitos). Máximo 15 dígitos (estándar internacional E.164).`;
  return `Teléfono inválido. Usá solo dígitos y opcionalmente + ( ) - o espacios. Ejemplo: +5491112345678.`;
}

function validarDocumento(doc) {
  // Acepta: CI uruguaya/argentina, DNI, NIE, Pasaporte, RUT, cédula latinoamericana, etc.
  // Regla: entre 5 y 20 caracteres alfanuméricos (puede tener puntos/guiones como separadores)
  const limpio = String(doc).trim().replace(/[\.\-\s]/g, '');
  return limpio.length >= 5 && limpio.length <= 20 && /^[A-Za-z0-9]+$/.test(limpio);
}

function parseFechaLocal(str) {
  // Parsea como fecha LOCAL para evitar desfase UTC (ej: Argentina UTC-3)
  const s = (str || '').split(' ')[0];
  const parts = s.split('-').map(Number);
  if (parts.length !== 3 || parts.some(isNaN)) return null;
  return new Date(parts[0], parts[1] - 1, parts[2]); // month 0-indexed, hora local
}

function sugerirFechaFutura(fecha) {
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const sug = new Date(fecha);
  sug.setFullYear(hoy.getFullYear());
  if (sug < hoy) sug.setFullYear(hoy.getFullYear() + 1);
  const y = sug.getFullYear();
  const m = String(sug.getMonth()+1).padStart(2,'0');
  const d = String(sug.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

function validarFechas(fecha_inicio, fecha_fin) {
  const hoy = new Date(); hoy.setHours(0, 0, 0, 0);
  const fi  = parseFechaLocal(fecha_inicio);
  const ff  = parseFechaLocal(fecha_fin);
  const fmt = d => `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
  if (!fi) return { ok:false, error:'Fecha de inicio inválida. Usá el formato YYYY-MM-DD (ej: 2027-03-15).' };
  if (!ff) return { ok:false, error:'Fecha de fin inválida. Usá el formato YYYY-MM-DD (ej: 2027-03-18).' };
  if (fi < hoy) {
    const sug = sugerirFechaFutura(fi);
    return { ok:false, error:`La fecha de inicio ${fmt(fi)} ya pasó (hoy es ${fmt(hoy)}). ¿Querías decir ${sug}?` };
  }
  if (ff <= fi) return { ok:false, error:'La fecha de fin debe ser posterior a la de inicio.' };
  return { ok:true };
}

/* ═══════════════════════════════════════════════════════════════════
   BÚSQUEDA DE CAMPER (acepta nombre parcial O key TC-XXX)
═══════════════════════════════════════════════════════════════════ */
async function buscarCamperSB(query) {
  // 1. Por key exacta (TC-ACS, tc-acs, etc.)
  let { data } = await sbClient.from('campers').select('*').ilike('key', query).limit(1);
  if (data?.[0]) return data[0];
  // 2. Por modelo exacto (insensible a mayúsculas)
  ({ data } = await sbClient.from('campers').select('*').ilike('modelo', query).limit(1));
  if (data?.[0]) return data[0];
  // 3. Por modelo parcial
  ({ data } = await sbClient.from('campers').select('*').ilike('modelo', `%${query}%`).limit(1));
  return data?.[0] || null;
}

function buscarCamperMock(query) {
  const q = String(query).toLowerCase().trim();
  return (
    MOCK_DB.campers.find(c => c.key.toLowerCase() === q) ||
    MOCK_DB.campers.find(c => c.modelo.toLowerCase() === q) ||
    MOCK_DB.campers.find(c => c.modelo.toLowerCase().includes(q)) ||
    null
  );
}

// findCamper: intenta Supabase; si no encuentra NADA (o falla), usa mock.
// Acepta: key exacta (TC-ACS), nombre exacto o nombre parcial.
async function findCamper(query) {
  if (!query) return null;
  // 1. Intentar Supabase
  if (sbClient) {
    try {
      const camper = await buscarCamperSB(query);
      if (camper) return camper;
      // Supabase conectado pero sin resultado → igual prueba mock de demostración
    } catch(e) { /* red/permisos → fallback */ }
  }
  // 2. Siempre cae aquí si Supabase no encontró nada o no está configurado
  return buscarCamperMock(query);
}

   SUPABASE + TOOL EXECUTORS
═══════════════════════════════════════════════════════════════════ */
let sbClient = null;

function initSupabase() {
  if (CONFIG.SUPABASE_URL && CONFIG.SUPABASE_ANON_KEY && window.supabase) {
    sbClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
  }
}

async function execConsultarCampers(f) {
  let data = [...MOCK_DB.campers];

  if (sbClient) {
    try {
      let q = sbClient.from('campers').select('*');
      if (f.estado !== undefined)            q = q.eq('estado', f.estado);
      if (f.disponible !== undefined)        q = q.eq('disponible', f.disponible);
      if (f.tipo !== undefined)              q = q.eq('tipo', f.tipo);
      if (f.capacidad_min !== undefined)     q = q.gte('capacidad', f.capacidad_min);
      if (f.capacidad_max !== undefined)     q = q.lte('capacidad', f.capacidad_max);
      if (f.precio_max !== undefined)        q = q.lte('precio_diario', f.precio_max);
      if (f.precio_min !== undefined)        q = q.gte('precio_diario', f.precio_min);
      if (f.tiene_ac === true)               q = q.eq('ac', true);
      if (f.tiene_bano === true)             q = q.eq('bano', true);
      if (f.tiene_calefaccion === true)      q = q.eq('calefaccion', true);
      if (f.modelo !== undefined)            q = q.ilike('modelo', `%${f.modelo}%`);
      q = q.order('precio_diario', { ascending: true });
      const { data: sbData, error } = await q;
      if (!error && sbData) data = sbData;
    } catch(e) { /* fallback to mock */ }
  } else {
    if (f.estado !== undefined)            data = data.filter(c => c.estado === f.estado);
    if (f.disponible !== undefined)        data = data.filter(c => c.disponible === f.disponible);
    if (f.tipo !== undefined)              data = data.filter(c => c.tipo === f.tipo);
    if (f.capacidad_min !== undefined)     data = data.filter(c => c.capacidad >= f.capacidad_min);
    if (f.capacidad_max !== undefined)     data = data.filter(c => c.capacidad <= f.capacidad_max);
    if (f.precio_max !== undefined)        data = data.filter(c => c.precio_diario <= f.precio_max);
    if (f.precio_min !== undefined)        data = data.filter(c => c.precio_diario >= f.precio_min);
    if (f.tiene_ac === true)               data = data.filter(c => c.ac);
    if (f.tiene_bano === true)             data = data.filter(c => c.bano);
    if (f.tiene_calefaccion === true)      data = data.filter(c => c.calefac
