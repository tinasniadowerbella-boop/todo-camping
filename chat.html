<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TodoCamping ГўВЂВ” Asistente IA</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --agent-primary: #1e40af;
      --agent-light:   #eff6ff;
      --agent-dark:    #1e3a8a;
      --gray-bg:      #f4f6f8;
      --gray-border:  #dde1e7;
      --gray-text:    #6b7280;
      --white:        #ffffff;
      --radius:       18px;
      --shadow:       0 4px 24px rgba(0,0,0,.12);
      --font:         'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      font-family: var(--font);
      background: transparent;
      margin: 0; padding: 0;
    }

    #chat-widget {
      position: fixed;
      bottom: 24px; right: 24px;
      width: 400px; height: 680px;
      background: var(--white);
      border-radius: 20px;
      box-shadow: var(--shadow);
      display: flex; flex-direction: column;
      overflow: hidden;
      z-index: 9999;
      transition: opacity .25s, transform .25s;
    }
    #chat-widget.tc-hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(16px);
    }

    #chat-bubble {
      position: fixed;
      bottom: 24px; right: 24px;
      width: 62px; height: 62px;
      background: var(--agent-primary);
      color: var(--white);
      border: none; border-radius: 50%;
      cursor: pointer; font-size: 26px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,.28);
      z-index: 9998;
      transition: background .3s, transform .15s;
    }
    #chat-bubble:hover { transform: scale(1.07); }
    #chat-bubble.tc-hidden { display: none; }

    .header-close {
      background: none; border: none;
      color: var(--white); font-size: 18px;
      cursor: pointer; opacity: .75; padding: 0 0 0 6px; line-height: 1;
      flex-shrink: 0;
    }
    .header-close:hover { opacity: 1; }

    #chat-header {
      background: var(--agent-primary);
      color: var(--white);
      padding: 14px 18px;
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
      transition: background .4s ease;
    }

    .header-avatar {
      width: 42px; height: 42px;
      background: var(--agent-dark);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700;
      flex-shrink: 0;
      transition: background .4s ease;
    }

    .header-info { flex: 1; }
    .header-info strong { display: block; font-size: 15px; }
    .header-info span   { font-size: 12px; opacity: .8; }

    .status-dot {
      width: 9px; height: 9px;
      background: #4ade80;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.3);
      flex-shrink: 0;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex; flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-thumb { background: var(--gray-border); border-radius: 4px; }

    .msg-row {
      display: flex; gap: 8px;
      max-width: 86%;
    }
    .msg-row.user  { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.agent { align-self: flex-start; }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      flex-shrink: 0; align-self: flex-end;
    }
    .msg-avatar[data-agent="leo"]      { background: #dbeafe; color: #1e40af; }
    .msg-avatar[data-agent="cami"]     { background: #e8f5ee; color: #2d7a4f; }
    .msg-avatar[data-agent="reservas"] { background: #fef3c7; color: #b45309; }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .msg-row.user .bubble {
      background: var(--agent-primary);
      color: var(--white);
      border-bottom-right-radius: 4px;
      transition: background .4s ease;
    }

    .msg-row.agent .bubble {
      background: var(--white);
      color: #1f2937;
      border: 1px solid var(--gray-border);
      border-bottom-left-radius: 4px;
    }

    .bubble table { border-collapse: collapse; font-size: 13px; margin-top: 6px; width: 100%; }
    .bubble th, .bubble td { border: 1px solid var(--gray-border); padding: 4px 8px; text-align: left; }
    .bubble th { background: var(--agent-light); font-weight: 600; }
    .bubble strong { font-weight: 600; }
    .bubble em { font-style: italic; }

    .handoff-event {
      align-self: center;
      background: var(--gray-bg);
      border: 1px solid var(--gray-border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      color: var(--gray-text);
    }

    #typing-indicator {
      display: none;
      align-self: flex-start;
      padding: 10px 14px;
      background: var(--white);
      border: 1px solid var(--gray-border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      gap: 4px; align-items: center;
    }
    #typing-indicator.visible { display: flex; }
    .dot {
      width: 7px; height: 7px;
      background: var(--gray-text);
      border-radius: 50%;
      animation: bounce .9s infinite;
    }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

    #chat-input-area {
      padding: 12px 14px;
      border-top: 1px solid var(--gray-border);
      display: flex; gap: 8px;
      flex-shrink: 0;
      background: var(--white);
    }

    #user-input {
      flex: 1;
      border: 1px solid var(--gray-border);
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: var(--font);
      outline: none;
      transition: border-color .2s;
    }
    #user-input:focus { border-color: var(--agent-primary); }

    #send-btn {
      background: var(--agent-primary);
      color: var(--white);
      border: none; border-radius: 50%;
      width: 40px; height: 40px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .4s ease;
    }
    #send-btn:hover    { filter: brightness(.9); }
    #send-btn:disabled { background: var(--gray-border); cursor: not-allowed; }
    #send-btn svg { width: 17px; height: 17px; }

    .error-banner {
      background: #fef2f2; color: #dc2626;
      border: 1px solid #fecaca; border-radius: 10px;
      padding: 10px 14px; font-size: 13px;
      align-self: center; max-width: 90%; text-align: center;
    }

    #config-panel {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
    }
    #config-panel.hidden { display: none; }

    #config-box {
      background: var(--white); border-radius: 16px;
      padding: 26px; max-width: 400px; width: 100%;
      box-shadow: var(--shadow);
    }
    #config-box h2 { font-size: 17px; color: #1e40af; margin-bottom: 4px; }
    #config-box p  { font-size: 13px; color: var(--gray-text); margin-bottom: 18px; line-height: 1.5; }

    .config-field { margin-bottom: 12px; }
    .config-field label {
      display: block; font-size: 12px; font-weight: 600;
      margin-bottom: 4px; color: #374151;
    }
    .config-field input {
      width: 100%; border: 1px solid var(--gray-border);
      border-radius: 8px; padding: 9px 12px;
      font-size: 13px; font-family: var(--font); outline: none;
    }
    .config-field input:focus { border-color: #1e40af; }
    .config-note { font-size: 11px; color: var(--gray-text); margin-top: 3px; }

    #config-save {
      width: 100%; background: #1e40af; color: var(--white);
      border: none; border-radius: 10px; padding: 11px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      font-family: var(--font); transition: background .2s; margin-top: 4px;
    }
    #config-save:hover { background: #1e3a8a; }

    .demo-badge {
      display: inline-block;
      background: #fef3c7; color: #b45309;
      font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 20px;
      margin-left: 6px; vertical-align: middle;
    }

    @media (max-width: 520px) {
      #chat-widget {
        bottom: 0; right: 0;
        width: 100%; height: 92dvh;
        border-radius: 20px 20px 0 0;
      }
      #chat-bubble { bottom: 16px; right: 16px; }
    }
  </style>
</head>

/* ГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•Вђ

function validarEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(String(email).trim());
}

function validarTelefono(tel) {
  const digits = String(tel).replace(/[\s\-\+\(\)\.]/g, '');
  return digits.length >= 7 && digits.length <= 15 && /^\d+$/.test(digits);
}
function mensajeErrorTelefono(tel) {
  const digits = String(tel).replace(/[\s\-\+\(\)\.]/g, '');
  if (digits.length < 7)  return `TelГѓВ©fono demasiado corto (${digits.length} dГѓВ­gitos). Debe tener entre 7 y 15 dГѓВ­gitos.`;
  if (digits.length > 15) return `TelГѓВ©fono demasiado largo (${digits.length} dГѓВ­gitos). MГѓВЎximo 15 dГѓВ­gitos.`;
  return `TelГѓВ©fono invГѓВЎlido. UsГѓВЎ solo dГѓВ­gitos y opcionalmente + ( ) - o espacios.`;
}

function validarDocumento(doc) {
  const limpio = String(doc).trim().replace(/[\.\-\s]/g, '');
  return limpio.length >= 5 && limpio.length <= 20 && /^[A-Za-z0-9]+$/.test(limpio);
}

function parseFechaLocal(str) {
  const s = (str || '').split(' ')[0];
  const parts = s.split('-').map(Number);
  if (parts.length !== 3 || parts.some(isNaN)) return null;
  return new Date(parts[0], parts[1] - 1, parts[2]);
}

function sugerirFechaFutura(fecha) {
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const sug = new Date(fecha);
  sug.setFullYear(hoy.getFullYear());
  if (sug < hoy) sug.setFullYear(hoy.getFullYear() + 1);
  const y = sug.getFullYear();
  const m = String(sug.getMonth()+1).padStart(2,'0');
  const d = String(sug.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

function validarFechas(fecha_inicio, fecha_fin) {
  const hoy = new Date(); hoy.setHours(0, 0, 0, 0);
  const fi  = parseFechaLocal(fecha_inicio);
  const ff  = parseFechaLocal(fecha_fin);
  const fmt = d => `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
  if (!fi) return { ok:false, error:'Fecha de inicio invГѓВЎlida. UsГѓВЎ el formato YYYY-MM-DD.' };
  if (!ff) return { ok:false, error:'Fecha de fin invГѓВЎlida. UsГѓВЎ el formato YYYY-MM-DD.' };
  if (fi < hoy) {
    const sug = sugerirFechaFutura(fi);
    return { ok:false, error:`La fecha de inicio ${fmt(fi)} ya pasГѓВі (hoy es ${fmt(hoy)}). Г‚ВїQuerГѓВ­as decir ${sug}?` };
  }
  if (ff <= fi) return { ok:false, error:'La fecha de fin debe ser posterior a la de inicio.' };
  return { ok:true };
}

async function buscarCamperSB(query) {
  let { data } = await sbClient.from('campers').select('*').ilike('key', query).limit(1);
  if (data?.[0]) return data[0];
  ({ data } = await sbClient.from('campers').select('*').ilike('modelo', query).limit(1));
  if (data?.[0]) return data[0];
  ({ data } = await sbClient.from('campers').select('*').ilike('modelo', `%${query}%`).limit(1));
  return data?.[0] || null;
}

function buscarCamperMock(query) {
  const q = String(query).toLowerCase().trim();
  return (
    MOCK_DB.campers.find(c => c.key.toLowerCase() === q) ||
    MOCK_DB.campers.find(c => c.modelo.toLowerCase() === q) ||
    MOCK_DB.campers.find(c => c.modelo.toLowerCase().includes(q)) ||
    null
  );
}

async function findCamper(query) {
  if (!query) return null;
  if (sbClient) {
    try {
      const camper = await buscarCamperSB(query);
      if (camper) return camper;
    } catch(e) { /* fallback */ }
  }
  return buscarCamperMock(query);
}

/* ГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•Вђ

ГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•Вђ */
async function execConsultarCampers(f) {
  let data = [...MOCK_DB.campers];

  if (sbClient) {
    try {
      let q = sbClient.from('campers').select('*');
      if (f.estado !== undefined)            q = q.eq('estado', f.estado);
      if (f.disponible !== undefined)        q = q.eq('disponible', f.disponible);
      if (f.tipo !== undefined)              q = q.eq('tipo', f.tipo);
      if (f.capacidad_min !== undefined)     q = q.gte('capacidad', f.capacidad_min);
      if (f.capacidad_max !== undefined)     q = q.lte('capacidad', f.capacidad_max);
      if (f.precio_max !== undefined)        q = q.lte('precio_diario', f.precio_max);
      if (f.precio_min !== undefined)        q = q.gte('precio_diario', f.precio_min);
      if (f.tiene_ac === true)               q = q.eq('ac', true);
      if (f.tiene_bano === true)             q = q.eq('bano', true);
      if (f.tiene_calefaccion === true)      q = q.eq('calefaccion', true);
      if (f.modelo !== undefined)            q = q.ilike('modelo', `%${f.modelo}%`);
      q = q.order('precio_diario', { ascending: true });
      const { data: sbData, error } = await q;
      if (!error && sbData) data = sbData;
    } catch(e) { /* fallback to mock */ }
  } else {
    if (f.estado !== undefined)            data = data.filter(c => c.estado === f.estado);
    if (f.disponible !== undefined)        data = data.filter(c => c.disponible === f.disponible);
    if (f.tipo !== undefined)              data = data.filter(c => c.tipo === f.tipo);
    if (f.capacidad_min !== undefined)     data = data.filter(c => c.capacidad >= f.capacidad_min);
    if (f.capacidad_max !== undefined)     data = data.filter(c => c.capacidad <= f.capacidad_max);
    if (f.precio_max !== undefined)        data = data.filter(c => c.precio_diario <= f.precio_max);
    if (f.precio_min !== undefined)        data = data.filter(c => c.precio_diario >= f.precio_min);
    if (f.tiene_ac === true)               data = data.filter(c => c.ac);
    if (f.tiene_bano === true)             data = data.filter(c => c.bano);
    if (f.tiene_calefaccion === true)      data = data.filter(c => c.calefaccion);
    if (f.modelo !== undefined)            data = data.filter(c => c.modelo.toLowerCase().includes(f.modelo.toLowerCase()));
    data.sort((a, b) => a.precio_diario - b.precio_diario);
  }

  return data.length === 0
    ? { resultado: 'Sin coincidencias con los filtros indicados.', campers: [] }
    : { total: data.length, campers: data };
}

async function execVerificarDisp({ modelo, fecha_inicio, fecha_fin }) {
  const fv = validarFechas(fecha_inicio, fecha_fin);
  if (!fv.ok) return { disponible: false, error: fv.error };

  const camper = await findCamper(modelo);
  if (!camper) return {
    disponible: false,
    motivo: `Camper "${modelo}" no encontrado. Modelos disponibles: ${MOCK_DB.campers.filter(c=>c.estado==='Activo').map(c=>c.modelo).join(' Г‚В· ')}.`
  };
  if (camper.estado !== 'Activo') return { disponible: false, motivo: `El camper estГѓВЎ en estado "${camper.estado}" y no puede reservarse.` };
  if (!camper.disponible)         return { disponible: false, motivo: 'El camper no estГѓВЎ disponible actualmente.' };

  const fi = fecha_inicio.split(' ')[0];
  const ff = fecha_fin.split(' ')[0];
  let ocupadas = 0;
  if (sbClient) {
    try {
      const { count } = await sbClient.from('reservas')
        .select('*', { count:'exact', head:true })
        .eq('camper_key', camper.key)
        .in('estado_reserva', ['Confirmada','Pendiente'])
        .lte('fecha_inicio', ff).gte('fecha_fin', fi);
      ocupadas = count || 0;
    } catch(e) {
      ocupadas = MOCK_DB.reservas.filter(r =>
        r.camper_key === camper.key && ['Confirmada','Pendiente'].includes(r.estado_reserva) &&
        r.fecha_inicio <= ff && r.fecha_fin >= fi).length;
    }
  } else {
    ocupadas = MOCK_DB.reservas.filter(r =>
      r.camper_key === camper.key && ['Confirmada','Pendiente'].includes(r.estado_reserva) &&
      r.fecha_inicio <= ff && r.fecha_fin >= fi).length;
  }
  const disponibles = (camper.unidades || 1) - ocupadas;
  return {
    disponible: disponibles > 0,
    modelo: camper.modelo, key: camper.key,
    precio_por_noche: camper.precio_diario,
    moneda: '$UY',
    unidades_totales: camper.unidades || 1,
    unidades_disponibles: Math.max(0, disponibles),
  };
}

async function execCrearReserva(args) {
  const fv = validarFechas(args.fecha_inicio, args.fecha_fin);
  if (!fv.ok) return { error: fv.error };

  if (!validarEmail(args.cliente_email))
    return { error: `Email invГѓВЎlido: "${args.cliente_email}". Formato esperado: nombre@dominio.com` };

  if (args.cliente_documento && !validarDocumento(args.cliente_documento))
    return { error: `Documento invГѓВЎlido: "${args.cliente_documento}". Formatos vГѓВЎlidos: DNI, NIE, Pasaporte o cГѓВ©dula alfanumГѓВ©rica.` };

  if (args.cliente_telefono && !validarTelefono(args.cliente_telefono))
    return { error: mensajeErrorTelefono(args.cliente_telefono) };

  const camper = await findCamper(args.camper_modelo);
  if (!camper) return { error: `Camper "${args.camper_modelo}" no encontrado.` };

  const fi = parseFechaLocal(args.fecha_inicio);
  const ff = parseFechaLocal(args.fecha_fin);
  const noches = Math.round((ff - fi) / 86400000);
  if (noches <= 0) return { error: 'La fecha de fin debe ser posterior a la de inicio.' };
  const precio_total = camper.precio_diario * noches;

  if (sbClient) {
    try {
      const { count } = await sbClient.from('reservas').select('*', { count:'exact', head:true });
      const reserva_ref = `RES-${String((count || 0) + 1).padStart(4, '0')}`;
      const { data, error } = await sbClient.from('reservas').insert({
        camper_id: camper.id, camper_key: camper.key, reserva_ref,
        cliente_nombre: args.cliente_nombre,
        cliente_documento: args.cliente_documento || null,
        cliente_telefono:  args.cliente_telefono  || null,
        cliente_email: args.cliente_email,
        fecha_inicio: args.fecha_inicio.split(' ')[0],
        fecha_fin:    args.fecha_fin.split(' ')[0],
        num_personas: args.num_personas || null,
        estado_reserva: 'Pendiente',
        precio_total, notas: args.notas || null,
      }).select().single();
      if (error) return { error: error.message };
      return { ok:true, id_reserva:reserva_ref, modelo:camper.modelo, precio_total, noches, moneda:'$UY' };
    } catch(e) { /* fallback a mock */ }
  }

  const reserva_ref = `RES-${String(MOCK_DB._nextId++).padStart(4, '0')}`;
  MOCK_DB.reservas.push({
    id: reserva_ref, reserva_ref,
    camper_id: camper.id, camper_key: camper.key, camper_modelo: camper.modelo,
    cliente_nombre: args.cliente_nombre,
    cliente_documento: args.cliente_documento || null,
    cliente_telefono:  args.cliente_telefono  || null,
    cliente_email: args.cliente_email,
    fecha_inicio: args.fecha_inicio.split(' ')[0],
    fecha_fin:    args.fecha_fin.split(' ')[0],
    num_personas: args.num_personas || null,
    estado_reserva: 'Pendiente',
    precio_total, notas: args.notas || null,
  });
  return { ok:true, id_reserva:reserva_ref, modelo:camper.modelo, precio_total, noches, moneda:'$UY' };
}

async function execBuscarAlternativas({ fecha_inicio, fecha_fin, camper_modelo, num_personas }) {
  const disponibles = [];
  let campers = MOCK_DB.campers.filter(c => c.estado === 'Activo' && c.disponible);
  if (num_personas) campers = campers.filter(c => c.capacidad >= num_personas);

  if (sbClient) {
    try {
      let q = sbClient.from('campers').select('*').eq('estado', 'Activo').eq('disponible', true);
      if (num_personas) q = q.gte('capacidad', num_personas);
      const { data } = await q.order('precio_diario', { ascending: true });
      if (data) campers = data;
    } catch(e) { /* fallback to mock */ }
  }

  for (const c of campers) {
    if (camper_modelo && c.modelo.toLowerCase().includes(camper_modelo.toLowerCase())) continue;
    let ocupadas = 0;
    if (sbClient) {
      try {
        const { count } = await sbClient.from('reservas').select('*', { count: 'exact', head: true })
          .eq('camper_key', c.key).in('estado_reserva', ['Confirmada','Pendiente'])
          .lte('fecha_inicio', fecha_fin).gte('fecha_fin', fecha_inicio);
        ocupadas = count || 0;
      } catch(e) { /* fallback */ }
    } else {
      ocupadas = MOCK_DB.reservas.filter(r =>
        r.camper_key === c.key && ['Confirmada','Pendiente'].includes(r.estado_reserva) &&
        r.fecha_inicio <= fecha_fin && r.fecha_fin >= fecha_inicio
      ).length;
    }
    if ((c.unidades || 1) - ocupadas > 0) {
      disponibles.push({ modelo: c.modelo, camper_key: c.key, precio_diario: c.precio_diario, capacidad: c.capacidad });
    }
  }
  return disponibles.length
    ? { disponibles_en_esas_fechas: disponibles, total: disponibles.length }
    : { resultado: 'No hay campers alternativos disponibles en esas fechas.' };
}

async function execModificarReserva(args) {
  const { id_reserva, camper_modelo, fecha_inicio, fecha_fin, cliente_telefono, cliente_email, estado_reserva, observaciones } = args;

  if (sbClient) {
    try {
      const updates = {};
      if (fecha_inicio)     updates.fecha_inicio    = fecha_inicio;
      if (fecha_fin)        updates.fecha_fin        = fecha_fin;
      if (cliente_telefono) updates.cliente_telefono = cliente_telefono;
      if (cliente_email)    updates.cliente_email    = cliente_email;
      if (estado_reserva)   updates.estado_reserva   = estado_reserva;
      if (observaciones)    updates.notas            = observaciones;
      if (camper_modelo) {
        const { data: c } = await sbClient.from('campers').select('id,key').ilike('modelo', `%${camper_modelo}%`).limit(1).single();
        if (c) { updates.camper_id = c.id; updates.camper_key = c.key; }
      }
      const { data, error } = await sbClient.from('reservas').update(updates).eq('reserva_ref', id_reserva).select().single();
      if (error) return { error: error.message };
      return { ok: true, reserva: data };
    } catch(e) { /* fallback */ }
  }
  const idx = MOCK_DB.reservas.findIndex(r => r.reserva_ref === id_reserva || r.id === id_reserva);
  if (idx === -1) return { error: `Reserva ${id_reserva} no encontrada.` };
  const r = MOCK_DB.reservas[idx];
  if (camper_modelo) {
    const c = MOCK_DB.campers.find(c => c.modelo.toLowerCase().includes(camper_modelo.toLowerCase()));
    if (c) { r.camper_key = c.key; r.camper_modelo = c.modelo; }
  }
  if (fecha_inicio)     r.fecha_inicio    = fecha_inicio;
  if (fecha_fin)        r.fecha_fin        = fecha_fin;
  if (cliente_telefono) r.cliente_telefono = cliente_telefono;
  if (cliente_email)    r.cliente_email    = cliente_email;
  if (estado_reserva)   r.estado_reserva   = estado_reserva;
  if (observaciones)    r.notas            = observaciones;
  return { ok: true, reserva: { ...r } };
}

async function execCancelarReserva({ id_reserva, motivo }) {
  if (sbClient) {
    try {
      const updates = { estado_reserva: 'Cancelada' };
      if (motivo) updates.notas = motivo;
      const { error } = await sbClient.from('reservas').update(updates).eq('reserva_ref', id_reserva);
      if (error) return { error: error.message };
      return { ok: true, id_reserva, estado: 'Cancelada' };
    } catch(e) { /* fallback */ }
  }
  const r = MOCK_DB.reservas.find(r => r.reserva_ref === id_reserva || r.id === id_reserva);
  if (!r) return { error: `Reserva ${id_reserva} no encontrada.` };
  r.estado_reserva = 'Cancelada';
  if (motivo) r.notas = motivo;
  return { ok: true, id_reserva, estado: 'Cancelada' };
}

async function execEliminarReserva({ id_reserva }) {
  if (sbClient) {
    try {
      const { error } = await sbClient.from('reservas').delete().eq('reserva_ref', id_reserva);
      if (error) return { error: error.message };
      return { ok: true, id_reserva, mensaje: 'Reserva eliminada permanentemente.' };
    } catch(e) { /* fallback */ }
  }
  const idx = MOCK_DB.reservas.findIndex(r => r.reserva_ref === id_reserva || r.id === id_reserva);
  if (idx === -1) return { error: `Reserva ${id_reserva} no encontrada.` };
  MOCK_DB.reservas.splice(idx, 1);
  return { ok: true, id_reserva, mensaje: 'Reserva eliminada permanentemente.' };
}

   CLAUDE API
ГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•Вђ */
async function callClaude(system, tools, messages) {
  const body = { model: CONFIG.MODEL, max_tokens: 1024, system, messages };
  if (tools?.length) body.tools = tools;

  const resp = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `Error ${resp.status}`);
  }
  return resp.json();
}

async function runLoop(userText) {
  const agentId = state.current;
  const history = state.histories[agentId];

  history.push({ role: 'user', content: userText });
  let messages = [...history];

  const system = PROMPTS[agentId];
  const tools  = AGENT_TOOLS[agentId];

  while (true) {
    const result = await callClaude(system, tools, messages);

    if (result.stop_reason === 'end_turn') {
      const text = result.content.filter(b => b.type === 'text').map(b => b.text).join('');
      history.push({ role: 'assistant', content: result.content });
      return { text, handoff: null };
    }

    if (result.stop_reason === 'tool_use') {
      messages.push({ role: 'assistant', content: result.content });

      const toolResults = [];
      let handoff = null;

      for (const block of result.content) {
        if (block.type !== 'tool_use') continue;
        let output;

        if (block.name === 'derivar_agente') {
          handoff = { agente: block.input.agente_destino, contexto: block.input.contexto, mensajeVisible: block.input.mensaje_usuario };
          output  = { ok: true };

        } else if (block.name === 'pasar_a_reservas') {
          handoff = { agente: 'reservas', contexto: block.input.contexto, mensajeVisible: block.input.mensaje_usuario };
          output  = { ok: true };

        } else if (block.name === 'pasar_a_cami') {
          handoff = { agente: 'cami', contexto: block.input.contexto, mensajeVisible: block.input.mensaje_usuario };
          output  = { ok: true };

        } else if (block.name === 'consultar_campers') {
          output = await execConsultarCampers(block.input);

        } else if (block.name === 'verificar_disponibilidad') {
          output = await execVerificarDisp(block.input);

        } else if (block.name === 'crear_reserva') {
          output = await execCrearReserva(block.input);

        } else if (block.name === 'consultar_reserva') {
          output = await execConsultarReserva(block.input);

        } else if (block.name === 'buscar_disponibilidad_alternativa') {
          output = await execBuscarAlternativas(block.input);

        } else if (block.name === 'consultar_reservas_por_cliente') {
          output = await execConsultarPorCliente(block.input);

        } else if (block.name === 'consultar_reservas_por_camper') {
          output = await execConsultarPorCamper(block.input);

        } else if (block.name === 'consultar_reservas_por_fecha') {
          output = await execConsultarPorFecha(block.input);

        } else if (block.name === 'listar_reservas_activas') {
          output = await execListarActivas();

        } else if (block.name === 'modificar_reserva') {
          output = await execModificarReserva(block.input);

        } else if (block.name === 'cancelar_reserva') {
          output = await execCancelarReserva(block.input);

        } else if (block.name === 'eliminar_reserva') {
          output = await execEliminarReserva(block.input);

        } else {
          output = { error: `Herramienta desconocida: ${block.name}` };
        }

        toolResults.push({ type: 'tool_result', tool_use_id: block.id, content: JSON.stringify(output) });
      }

      if (handoff) {
        history.push({ role: 'assistant', content: result.content });
        return { text: handoff.mensajeVisible, handoff };
      }

      messages.push({ role: 'user', content: toolResults });
      continue;
    }

    throw new Error(`Stop reason inesperado: ${result.stop_reason}`);
  }
}

/* ГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•Вђ
   HANDOFF
ГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•Вђ */
const AGENTE_ID_MAP = { informativo: 'cami', reservas: 'reservas' };

async function performHandoff(handoff) {
  const destId  = AGENTE_ID_MAP[handoff.agente] || handoff.agente;
  const destDef = AGENTS[destId];

  addHandoffEvent(`Conectando con ${destDef.name}...`);
  state.current = destId;
  updateTheme(destDef);

  const ctx = handoff.contexto;
  let brief = `[El usuario fue derivado desde otro agente. Contexto: ${ctx.resumen}.`;
  if (ctx.modelo)      brief += ` Modelo en mente: ${ctx.modelo}.`;
  if (ctx.fechas)      brief += ` Fechas ya confirmadas: ${ctx.fechas}.`;
  if (ctx.pax)         brief += ` Personas: ${ctx.pax}.`;
  if (ctx.presupuesto) brief += ` Presupuesto: ${ctx.presupuesto}.`;
  brief += ` SaludГѓВЎ al usuario brevemente (1 lГѓВ­nea), usГѓВЎ el contexto para no hacerle repetir nada, y empezГѓВЎ a ayudarle directamente.]`;

  setTyping(true);
  try {
    const { text } = await runLoop(brief);
    setTyping(false);
    if (text) addAgentMsg(text, destId);
  } catch(e) {
    setTyping(false);
    addError('Error al conectar con ' + destDef.name + ': ' + e.message);
  }
}

/* ГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•Вђ
   UI HELPERS
ГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•Вђ */
function updateTheme(agent) {
  const r = document.documentElement;
  r.style.setProperty('--agent-primary', agent.color);
  r.style.setProperty('--agent-light',   agent.colorLight);
  r.style.setProperty('--agent-dark',    agent.colorDark);
  document.getElementById('header-avatar').textContent = agent.avatar;
  document.getElementById('header-name').textContent   = agent.name;
  document.getElementById('header-role').textContent   = agent.role;
  const bubble = document.getElementById('chat-bubble');
  if (bubble) bubble.style.background = agent.color;
}

function renderMd(text) {
  return text
    .replace(/^\|(.+)\|$/gm, row =>
      `<tr>${row.slice(1,-1).split('|').map(c=>`<td>${c.trim()}</td>`).join('')}</tr>`)
    .replace(/(<tr>.*<\/tr>\n?)+/gs, match => {
      const rows = match.trim().split('\n').filter(r => !r.match(/^\|\s*[-:]+/));
      if (!rows.length) return match;
      const [h, ...rest] = rows;
      return `<table><thead>${h.replace(/<td>/g,'<th>').replace(/<\/td>/g,'</th>')}</thead><tbody>${rest.join('')}</tbody></table>`;
    })
    .replace(/^\|[\s\-:|]+\|$/gm, '')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function addUserMsg(text) {
  const msgs = document.getElementById('chat-messages');
  const tip  = document.getElementById('typing-indicator');
  const row  = document.createElement('div');
  row.className = 'msg-row user';
  const b = document.createElement('div');
  b.className = 'bubble';
  b.textContent = text;
  row.appendChild(b);
  msgs.insertBefore(row, tip);
  msgs.scrollTop = msgs.scrollHeight;
}

function addAgentMsg(text, agentId) {
  if (!text?.trim()) return;
  const agent = AGENTS[agentId || state.current];
  const msgs  = document.getElementById('chat-messages');
  const tip   = document.getElementById('typing-indicator');
  const row   = document.createElement('div');
  row.className = 'msg-row agent';
  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.dataset.agent = agent.id;
  av.textContent = agent.avatar;
  const b = document.createElement('div');
  b.className = 'bubble';
  b.innerHTML = renderMd(text);
  row.appendChild(av);
  row.appendChild(b);
  msgs.insertBefore(row, tip);
  msgs.scrollTop = msgs.scrollHeight;
}

function addHandoffEvent(text) {
  const msgs = document.getElementById('chat-messages');
  const tip  = document.getElementById('typing-indicator');
  const div  = document.createElement('div');
  div.className = 'handoff-event';
  div.textContent = text;
  msgs.insertBefore(div, tip);
  msgs.scrollTop = msgs.scrollHeight;
}

function addError(text) {
  const msgs = document.getElementById('chat-messages');
  const tip  = document.getElementById('typing-indicator');
  const div  = document.createElement('div');
  div.className = 'error-banner';
  div.textContent = text;
  msgs.insertBefore(div, tip);
  msgs.scrollTop = msgs.scrollHeight;
}

function setTyping(v) {
  document.getElementById('typing-indicator').classList.toggle('visible', v);
  document.getElementById('chat-messages').scrollTop = 99999;
}

function setDisabled(v) {
  document.getElementById('user-input').disabled = v;
  document.getElementById('send-btn').disabled   = v;
}

/* ГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•Вђ
   SEND HANDLER
ГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•Вђ */
async function handleSend() {
  const inp  = document.getElementById('user-input');
  const text = inp.value.trim();
  if (!text) return;

  inp.value = '';
  addUserMsg(text);
  setTyping(true);
  setDisabled(true);

  try {
    const { text: resp, handoff } = await runLoop(text);
    setTyping(false);
    if (resp) addAgentMsg(resp);
    if (handoff) await performHandoff(handoff);
  } catch(err) {
    setTyping(false);
    addError('Error: ' + err.message);
  } finally {
    setDisabled(false);
    document.getElementById('user-input').focus();
  }
}

  updateTheme(AGENTS.leo);

  try {
    const result = await callClaude(PROMPTS.leo, [TOOL_DERIVAR], [

    ]);
    const text = result.content.filter(b => b.type === 'text').map(b => b.text).join('');
    setTyping(false);
    addAgentMsg(text || 'Hola! Soy Leo, de TodoCamping. Buscas info sobre campers o quieres gestionar una reserva?', 'leo');
  } catch(e) {
    setTyping(false);
    addAgentMsg('Hola! Soy Leo, de TodoCamping. En que puedo ayudarte hoy?', 'leo');
  } finally {
    setDisabled(false);
    document.getElementById('user-input').focus();
  }
}
