<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TodoCamping — Asistente IA</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Agent theme — updated dynamically via JS */
      --agent-primary: #1e40af;
      --agent-light:   #eff6ff;
      --agent-dark:    #1e3a8a;
      /* Fixed */
      --gray-bg:      #f4f6f8;
      --gray-border:  #dde1e7;
      --gray-text:    #6b7280;
      --white:        #ffffff;
      --radius:       18px;
      --shadow:       0 4px 24px rgba(0,0,0,.12);
      --font:         'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--gray-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    /* ── Widget ─────────────────────────────────────────────────── */
    #chat-widget {
      width: 100%; max-width: 480px; height: 680px;
      background: var(--white);
      border-radius: 20px;
      box-shadow: var(--shadow);
      display: flex; flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    #chat-header {
      background: var(--agent-primary);
      color: var(--white);
      padding: 14px 18px;
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
      transition: background .4s ease;
    }

    .header-avatar {
      width: 42px; height: 42px;
      background: var(--agent-dark);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700;
      flex-shrink: 0;
      transition: background .4s ease;
    }

    .header-info { flex: 1; }
    .header-info strong { display: block; font-size: 15px; }
    .header-info span   { font-size: 12px; opacity: .8; }

    .status-dot {
      width: 9px; height: 9px;
      background: #4ade80;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.3);
      flex-shrink: 0;
    }

    /* ── Messages ───────────────────────────────────────────────── */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex; flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-thumb { background: var(--gray-border); border-radius: 4px; }

    /* ── Bubbles ────────────────────────────────────────────────── */
    .msg-row {
      display: flex; gap: 8px;
      max-width: 86%;
    }
    .msg-row.user  { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.agent { align-self: flex-start; }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      flex-shrink: 0; align-self: flex-end;
    }
    .msg-avatar[data-agent="leo"]      { background: #dbeafe; color: #1e40af; }
    .msg-avatar[data-agent="cami"]     { background: #e8f5ee; color: #2d7a4f; }
    .msg-avatar[data-agent="reservas"] { background: #fef3c7; color: #b45309; }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .msg-row.user .bubble {
      background: var(--agent-primary);
      color: var(--white);
      border-bottom-right-radius: 4px;
      transition: background .4s ease;
    }

    .msg-row.agent .bubble {
      background: var(--white);
      color: #1f2937;
      border: 1px solid var(--gray-border);
      border-bottom-left-radius: 4px;
    }

    /* Markdown básico en burbujas */
    .bubble table { border-collapse: collapse; font-size: 13px; margin-top: 6px; width: 100%; }
    .bubble th, .bubble td { border: 1px solid var(--gray-border); padding: 4px 8px; text-align: left; }
    .bubble th { background: var(--agent-light); font-weight: 600; }
    .bubble strong { font-weight: 600; }
    .bubble em { font-style: italic; }

    /* ── Handoff event ──────────────────────────────────────────── */
    .handoff-event {
      align-self: center;
      background: var(--gray-bg);
      border: 1px solid var(--gray-border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      color: var(--gray-text);
    }

    /* ── Typing indicator ───────────────────────────────────────── */
    #typing-indicator {
      display: none;
      align-self: flex-start;
      padding: 10px 14px;
      background: var(--white);
      border: 1px solid var(--gray-border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      gap: 4px; align-items: center;
    }
    #typing-indicator.visible { display: flex; }
    .dot {
      width: 7px; height: 7px;
      background: var(--gray-text);
      border-radius: 50%;
      animation: bounce .9s infinite;
    }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

    /* ── Input ──────────────────────────────────────────────────── */
    #chat-input-area {
      padding: 12px 14px;
      border-top: 1px solid var(--gray-border);
      display: flex; gap: 8px;
      flex-shrink: 0;
      background: var(--white);
    }

    #user-input {
      flex: 1;
      border: 1px solid var(--gray-border);
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: var(--font);
      outline: none;
      transition: border-color .2s;
    }
    #user-input:focus { border-color: var(--agent-primary); }

    #send-btn {
      background: var(--agent-primary);
      color: var(--white);
      border: none; border-radius: 50%;
      width: 40px; height: 40px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .4s ease;
    }
    #send-btn:hover    { filter: brightness(.9); }
    #send-btn:disabled { background: var(--gray-border); cursor: not-allowed; }
    #send-btn svg { width: 17px; height: 17px; }

    /* ── Error ──────────────────────────────────────────────────── */
    .error-banner {
      background: #fef2f2; color: #dc2626;
      border: 1px solid #fecaca; border-radius: 10px;
      padding: 10px 14px; font-size: 13px;
      align-self: center; max-width: 90%; text-align: center;
    }

    /* ── Config panel ───────────────────────────────────────────── */
    #config-panel {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
    }
    #config-panel.hidden { display: none; }

    #config-box {
      background: var(--white); border-radius: 16px;
      padding: 26px; max-width: 400px; width: 100%;
      box-shadow: var(--shadow);
    }
    #config-box h2 { font-size: 17px; color: #1e40af; margin-bottom: 4px; }
    #config-box p  { font-size: 13px; color: var(--gray-text); margin-bottom: 18px; line-height: 1.5; }

    .config-field { margin-bottom: 12px; }
    .config-field label {
      display: block; font-size: 12px; font-weight: 600;
      margin-bottom: 4px; color: #374151;
    }
    .config-field input {
      width: 100%; border: 1px solid var(--gray-border);
      border-radius: 8px; padding: 9px 12px;
      font-size: 13px; font-family: var(--font); outline: none;
    }
    .config-field input:focus { border-color: #1e40af; }
    .config-note { font-size: 11px; color: var(--gray-text); margin-top: 3px; }

    #config-save {
      width: 100%; background: #1e40af; color: var(--white);
      border: none; border-radius: 10px; padding: 11px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      font-family: var(--font); transition: background .2s; margin-top: 4px;
    }
    #config-save:hover { background: #1e3a8a; }

    .demo-badge {
      display: inline-block;
      background: #fef3c7; color: #b45309;
      font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 20px;
      margin-left: 6px; vertical-align: middle;
    }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 520px) {
      body { padding: 0; align-items: flex-end; }
      #chat-widget { max-width: 100%; height: 100dvh; border-radius: 0; }
    }
  </style>
</head>
<body>

</div>

Datos del negocio: Madrid, Calle del Turismo 45 · L-V 9-19h · Sáb 10-14h · +34 91 234 56 78 · hola@todocamping.es.

MISIÓN: Detectar la intención del usuario y derivarle al agente correcto usando la herramienta "derivar_agente". No eres experto en campers ni en reservas.

TONO: cercano, breve, directo. Tuteas. Español neutro. Saludo máximo 2 líneas. Una pregunta por turno si algo no queda claro.

CUÁNDO DERIVAR A "informativo":
- Quiere info sobre modelos, precios, disponibilidad, equipamiento, comparativas, recomendaciones, requisitos legales.

CUÁNDO DERIVAR A "reservas":

SCOPE SÍ: specs técnicas, equipamiento, precios, disponibilidad, comparativas, requisitos legales generales, recomendaciones personalizadas.
SCOPE NO: datos personales de clientes, reservas existentes, pagos, info corporativa interna, temas ajenos a campers.

FLUJO:
1. Entiende qué busca. Si es claro, responde directo.
2. Pregunta solo lo imprescindible (1 por turno): personas, fechas, presupuesto, equipamiento clave.

const TOOL_CREAR_RESERVA = {
  name: 'crear_reserva',
  description: 'Crea una nueva reserva. Llamar SOLO tras confirmación explícita del usuario.',
  input_schema: {
    type: 'object',
    properties: {
      camper_modelo:  { type: 'string' },
      cliente_nombre: { type: 'string' },
      cliente_email:  { type: 'string' },
      fecha_inicio:   { type: 'string', description: 'YYYY-MM-DD' },
      fecha_fin:      { type: 'string', description: 'YYYY-MM-DD' },
      num_personas:   { type: 'integer' },
      notas:          { type: 'string' },
    },
    required: ['camper_modelo', 'cliente_nombre', 'cliente_email', 'fecha_inicio', 'fecha_fin'],
  },
};

const TOOL_CONSULTAR_RESERVA = {
  name: 'consultar_reserva',
  description: 'Busca una reserva existente por email o ID de reserva.',
  input_schema: {
    type: 'object',
    properties: {
      email:      { type: 'string' },
      id_reserva: { type: 'string' },
    },
  },
};

const AGENT_TOOLS = {
  leo:      [TOOL_DERIVAR],
  cami:     [TOOL_CONSULTAR_CAMPERS, TOOL_PASAR_RESERVAS],
  reservas: [TOOL_VERIFICAR_DISP, TOOL_CREAR_RESERVA, TOOL_CONSULTAR_RESERVA],
};

/* ═══════════════════════════════════════════════════════════════════
   SUPABASE + TOOL EXECUTORS
═══════════════════════════════════════════════════════════════════ */
let sbClient = null;

function initSupabase() {
  if (CONFIG.SUPABASE_URL && CONFIG.SUPABASE_ANON_KEY && window.supabase) {
    sbClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
  }
}

async function execConsultarCampers(f) {
  let data = [...MOCK_DB.campers];

  if (sbClient) {
    try {
      let q = sbClient.from('campers').select('*');
      if (f.estado !== undefined)            q = q.eq('estado', f.estado);
      if (f.disponible !== undefined)        q = q.eq('disponible', f.disponible);
      if (f.tipo !== undefined)              q = q.eq('tipo', f.tipo);
      if (f.capacidad_min !== undefined)     q = q.gte('capacidad', f.capacidad_min);
      if (f.capacidad_max !== undefined)     q = q.lte('capacidad', f.capacidad_max);
      if (f.precio_max !== undefined)        q = q.lte('precio_diario', f.precio_max);
      if (f.precio_min !== undefined)        q = q.gte('precio_diario', f.precio_min);
      if (f.tiene_ac === true)               q = q.eq('ac', true);
      if (f.tiene_bano === true)             q = q.eq('bano', true);
      if (f.tiene_calefaccion === true)      q = q.eq('calefaccion', true);
      if (f.modelo !== undefined)            q = q.ilike('modelo', `%${f.modelo}%`);
      q = q.order('precio_diario', { ascending: true });
      const { data: sbData, error } = await q;
      if (!error && sbData) data = sbData;
    } catch(e) { /* fallback to mock */ }
  } else {
    if (f.estado !== undefined)            data = data.filter(c => c.estado === f.estado);
    if (f.disponible !== undefined)        data = data.filter(c => c.disponible === f.disponible);
    if (f.tipo !== undefined)              data = data.filter(c => c.tipo === f.tipo);
    if (f.capacidad_min !== undefined)     data = data.filter(c => c.capacidad >= f.capacidad_min);
    if (f.capacidad_max !== undefined)     data = data.filter(c => c.capacidad <= f.capacidad_max);
    if (f.precio_max !== undefined)        data = data.filter(c => c.precio_diario <= f.precio_max);
    if (f.precio_min !== undefined)        data = data.filter(c => c.precio_diario >= f.precio_min);
    if (f.tiene_ac === true)               data = data.filter(c => c.ac);
    if (f.tiene_bano === true)             data = data.filter(c => c.bano);
    if (f.tiene_calefaccion === true)      data = data.filter(c => c.calefaccion);
    if (f.modelo !== undefined)            data = data.filter(c => c.modelo.toLowerCase().includes(f.modelo.toLowerCase()));
    data.sort((a, b) => a.precio_diario - b.precio_diario);
  }

  return data.length === 0
    ? { resultado: 'Sin coincidencias con los filtros indicados.', campers: [] }
    : { total: data.length, campers: data };
}

async function execVerificarDisp({ modelo, fecha_inicio, fecha_fin }) {
  if (sbClient) {
    try {
      const { data: camper } = await sbClient.from('campers').select('*').ilike('modelo', `%${modelo}%`).limit(1).single();
      if (!camper) return { disponible: false, motivo: 'Modelo no encontrado.' };
      if (!camper.disponible || camper.estado !== 'Activo') return { disponible: false, motivo: `Estado: ${camper.estado}` };
      const { data: conflicts } = await sbClient.from('reservas')
        .select('id').eq('camper_id', camper.id)
        .neq('estado_reserva', 'Cancelada')
        .lte('fecha_inicio', fecha_fin).gte('fecha_fin', fecha_inicio);
      return { disponible: !conflicts?.length, modelo: camper.modelo, precio_diario: camper.precio_diario };
    } catch(e) { /* fallback */ }
  }
  const camper = MOCK_DB.campers.find(c => c.modelo.toLowerCase().includes(modelo.toLowerCase()));
  if (!camper) return { disponible: false, motivo: 'Modelo no encontrado en el catálogo.' };
  if (!camper.disponible || camper.estado !== 'Activo') return { disponible: false, motivo: `El camper está en estado: ${camper.estado}.` };
  const conflict = MOCK_DB.reservas.some(r =>
    r.camper_id === camper.id && r.estado_reserva !== 'Cancelada' &&
    r.fecha_inicio <= fecha_fin && r.fecha_fin >= fecha_inicio
  );
  return { disponible: !conflict, modelo: camper.modelo, precio_diario: camper.precio_diario };
}

async function execCrearReserva(args) {
  if (sbClient) {
    try {
      const { data: camper } = await sbClient.from('campers').select('id,precio_diario').ilike('modelo', `%${args.camper_modelo}%`).limit(1).single();
      if (!camper) return { error: 'Modelo no encontrado.' };
      const dias = Math.ceil((new Date(args.fecha_fin) - new Date(args.fecha_inicio)) / 86400000);
      const { data, error } = await sbClient.from('reservas').insert({
        camper_id: camper.id,
        cliente_nombre: args.cliente_nombre, cliente_email: args.cliente_email,
        fecha_inicio: args.fecha_inicio, fecha_fin: args.fecha_fin,
        num_personas: args.num_personas, estado_reserva: 'Confirmada',
        precio_total: dias * camper.precio_diario, notas: args.notas,
      }).select().single();
      if (error) return { error: error.message };
      return { ok: true, id_reserva: data.id, precio_total: dias * camper.precio_diario, dias };
    } catch(e) { /* fallback */ }
  }
  const camper = MOCK_DB.campers.find(c => c.modelo.toLowerCase().includes(args.camper_modelo.toLowerCase()));
  if (!camper) return { error: 'Modelo no encontrado en el catálogo.' };
  const dias = Math.ceil((new Date(args.fecha_fin) - new Date(args.fecha_inicio)) / 86400000);
  if (dias <= 0) return { error: 'Las fechas no son válidas.' };
  const id = `RES-${String(MOCK_DB._nextId++).padStart(4, '0')}`;
  MOCK_DB.reservas.push({
    id, camper_id: camper.id, camper_modelo: camper.modelo,
    cliente_nombre: args.cliente_nombre, cliente_email: args.cliente_email,
    fecha_inicio: args.fecha_inicio, fecha_fin: args.fecha_fin,
    num_personas: args.num_personas || null,
    estado_reserva: 'Confirmada',
    precio_total: dias * camper.precio_diario,
    notas: args.notas || null,
  });
  return { ok: true, id_reserva: id, precio_total: dias * camper.precio_diario, dias };
}

async function execConsultarReserva({ email, id_reserva }) {
  if (sbClient) {
    try {
      let q = sbClient.from('reservas').select('*');
      if (id_reserva) q = q.eq('id', id_reserva);
      else if (email)  q = q.ilike('cliente_email', email);
      const { data } = await q.limit(5);
      return data?.length ? { reservas: data } : { resultado: 'No se encontraron reservas.' };
    } catch(e) { /* fallback */ }
  }
  let found = MOCK_DB.reservas;
  if (id_reserva) found = found.filter(r => r.id === id_reserva);
  else if (email)  found = found.filter(r => r.cliente_email?.toLowerCase() === email.toLowerCase());
  return found.length ? { reservas: found } : { resultado: 'No se encontraron reservas con esos datos.' };
}

/* ═══════════════════════════════════════════════════════════════════
   AGENT STATE
═══════════════════════════════════════════════════════════════════ */
const state = {
  current: 'leo',
  histories: { leo: [], cami: [], reservas: [] },
};

/* ═══════════════════════════════════════════════════════════════════
   CLAUDE API  (agentic loop)
═══════════════════════════════════════════════════════════════════ */
async function callClaude(system, tools, messages) {
  const body = { model: CONFIG.MODEL, max_tokens: 1024, system, messages };
  if (tools?.length) body.tools = tools;

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': CONFIG.ANTHROPIC_API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify(body),
  });

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `Error ${resp.status}`);
  }
  return resp.json();
}

/**
 * Runs the agentic loop for the current agent.
 * Returns { text: string, handoff: { agente, contexto, mensajeVisible } | null }
 */
async function runLoop(userText) {
  const agentId = state.current;
  const history = state.histories[agentId];

  history.push({ role: 'user', content: userText });
  let messages = [...history];

  const system = PROMPTS[agentId];
  const tools  = AGENT_TOOLS[agentId];

  while (true) {
    const result = await callClaude(system, tools, messages);

    if (result.stop_reason === 'end_turn') {
      const text = result.content.filter(b => b.type === 'text').map(b => b.text).join('');
      history.push({ role: 'assistant', content: result.content });
      return { text, handoff: null };
    }

    if (result.stop_reason === 'tool_use') {
      messages.push({ role: 'assistant', content: result.content });

      const toolResults = [];
      let handoff = null;

      for (const block of result.content) {
        if (block.type !== 'tool_use') continue;
        let output;

        if (block.name === 'derivar_agente') {
          handoff = { agente: block.input.agente_destino, contexto: block.input.contexto, mensajeVisible: block.input.mensaje_usuario };
          output  = { ok: true };

        } else if (block.name === 'pasar_a_reservas') {
          handoff = { agente: 'reservas', contexto: block.input.contexto, mensajeVisible: block.input.mensaje_usuario };
          output  = { ok: true };

        } else if (block.name === 'consultar_campers') {
          output = await execConsultarCampers(block.input);

        } else if (block.name === 'verificar_disponibilidad') {
          output = await execVerificarDisp(block.input);

        } else if (block.name === 'crear_reserva') {
          output = await execCrearReserva(block.input);

        } else if (block.name === 'consultar_reserva') {
          output = await execConsultarReserva(block.input);

        } else {
          output = { error: `Herramienta desconocida: ${block.name}` };
        }

        toolResults.push({ type: 'tool_result', tool_use_id: block.id, content: JSON.stringify(output) });
      }

      if (handoff) {
        history.push({ role: 'assistant', content: result.content });
        return { text: handoff.mensajeVisible, handoff };
      }

      messages.push({ role: 'user', content: toolResults });
      continue;
    }

    throw new Error(`Stop reason inesperado: ${result.stop_reason}`);
  }
}

/* ═══════════════════════════════════════════════════════════════════
   HANDOFF
═══════════════════════════════════════════════════════════════════ */
const AGENTE_ID_MAP = { informativo: 'cami', reservas: 'reservas' };

async function performHandoff(handoff) {
  const destId  = AGENTE_ID_MAP[handoff.agente] || handoff.agente;
  const destDef = AGENTS[destId];

  addHandoffEvent(`Conectando con ${destDef.name}...`);
  state.current = destId;
  updateTheme(destDef);

  // Build context briefing for the new agent
  const ctx = handoff.contexto;
  let brief = `Contexto del orquestador: ${ctx.resumen}.`;
  if (ctx.modelo)      brief += ` Camper mencionado: ${ctx.modelo}.`;
  if (ctx.fechas)      brief += ` Fechas: ${ctx.fechas}.`;
  if (ctx.pax)         brief += ` Personas: ${ctx.pax}.`;
  if (ctx.presupuesto) brief += ` Presupuesto: ${ctx.presupuesto}.`;
  brief += ' Saluda al usuario y empieza a ayudarle directamente.';

  setTyping(true);
  try {
    const { text } = await runLoop(brief);
    setTyping(false);
    if (text) addAgentMsg(text, destId);
  } catch(e) {
    setTyping(false);
    addError('Error al conectar con ' + destDef.name + ': ' + e.message);
  }
}

/* ═══════════════════════════════════════════════════════════════════
   UI HELPERS
═══════════════════════════════════════════════════════════════════ */
function updateTheme(agent) {
  const r = document.documentElement;
  r.style.setProperty('--agent-primary', agent.color);
  r.style.setProperty('--agent-light',   agent.colorLight);
  r.style.setProperty('--agent-dark',    agent.colorDark);
  document.getElementById('header-avatar').textContent = agent.avatar;
  document.getElementById('header-name').textContent   = agent.name;
  document.getElementById('header-role').textContent   = agent.role;
}

function renderMd(text) {
  return text
    .replace(/^\|(.+)\|$/gm, row =>
      `<tr>${row.slice(1,-1).split('|').map(c=>`<td>${c.trim()}</td>`).join('')}</tr>`)
    .replace(/(<tr>.*<\/tr>\n?)+/gs, match => {
      const rows = match.trim().split('\n').filter(r => !r.match(/^\|\s*[-:]+/));
      if (!rows.length) return match;
      const [h, ...rest] = rows;
      return `<table><thead>${h.replace(/<td>/g,'<th>').replace(/<\/td>/g,'</th>')}</thead><tbody>${rest.join('')}</tbody></table>`;
    })
    .replace(/^\|[\s\-:|]+\|$/gm, '')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function addUserMsg(text) {
  const msgs = document.getElementById('chat-messages');
  const tip  = document.getElementById('typing-indicator');
  const row  = document.createElement('div');
  row.className = 'msg-row user';
  const b = document.createElement('div');
  b.className = 'bubble';
  b.textContent = text;
  row.appendChild(b);
  msgs.insertBefore(row, tip);
  msgs.scrollTop = msgs.scrollHeight;
}

function addAgentMsg(text, agentId) {
  if (!text?.trim()) return;
  const agent = AGENTS[agentId || state.current];
  const msgs  = document.getElementById('chat-messages');
  const tip   = document.getElementById('typing-indicator');
  const row   = document.createElement('div');
  row.className = 'msg-row agent';
  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.dataset.agent = agent.id;
  av.textContent = agent.avatar;
  const b = document.createElement('div');
  b.className = 'bubble';
  b.innerHTML = renderMd(text);
  row.appendChild(av);
  row.appendChild(b);
  msgs.insertBefore(row, tip);
  msgs.scrollTop = msgs.scrollHeight;
}

function addHandoffEvent(text) {
  const msgs = document.getElementById('chat-messages');
  const tip  = document.getElementById('typing-indicator');
  const div  = document.createElement('div');
  div.className = 'handoff-event';
  div.textContent = text;
  msgs.insertBefore(div, tip);
  msgs.scrollTop = msgs.scrollHeight;
}

function addError(text) {
  const msgs = document.getElementById('chat-messages');
  const tip  = document.getElementById('typing-indicator');
  const div  = document.createElement('div');
  div.className = 'error-banner';
  div.textContent = text;
  msgs.insertBefore(div, tip);
  msgs.scrollTop = msgs.scrollHeight;
}

function setTyping(v) {
  document.getElementById('typing-indicator').classList.toggle('visible', v);
  document.getElementById('chat-messages').scrollTop = 99999;
}

function setDisabled(v) {
  document.getElementById('user-input').disabled = v;
  document.getElementById('send-btn').disabled   = v;
}

/* ═══════════════════════════════════════════════════════════════════
   SEND HANDLER
═══════════════════════════════════════════════════════════════════ */
async function handleSend() {
  const inp  = document.getElementById('user-input');
  const text = inp.value.trim();
  if (!text) return;

  inp.value = '';
  addUserMsg(text);
  setTyping(true);
  setDisabled(true);

  try {
    const { text: resp, handoff } = await runLoop(text);
    setTyping(false);
    if (resp) addAgentMsg(resp);
    if (handoff) await performHandoff(handoff);
  } catch(err) {
    setTyping(false);
    addError('Error: ' + err.message);
  } finally {
    setDisabled(false);
    document.getElementById('user-input').focus();
  }
}

/* ═══════════════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════════════ */
async function iniciar() {
  initSupabase();
  updateTheme(AGENTS.leo);
  setTyping(true);
  setDisabled(true);
  try {
    // One-shot greeting from Leo (not stored in history)
    const result = await callClaude(PROMPTS.leo, [TOOL_DERIVAR], [
      { role: 'user', content: '(El usuario acaba de abrir el chat por primera vez. Salúdale brevemente y pregunta en qué puedes ayudarle.)' }
    ]);
    const text = result.content.filter(b => b.type === 'text').map(b => b.text).join('');
    setTyping(false);
    addAgentMsg(text || '¡Hola! Soy Leo, de TodoCamping. ¿Buscas info sobre campers o quieres gestionar una reserva?', 'leo');
  } catch(e) {
    setTyping(false);
    addAgentMsg('¡Hola! Soy Leo, de TodoCamping. ¿Buscas información sobre campers o quieres gestionar una reserva?', 'leo');
  } finally {
    setDisabled(false);
    document.getElementById('user-input').focus();
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const panel    = document.getElementById('config-panel');
  const saveBtn  = document.getElementById('config-save');
  const sendBtn  = document.getElementById('send-btn');
  const userInput = document.getElementById('user-input');

  // Auto-start if key already hardcoded
  if (CONFIG.ANTHROPIC_API_KEY) {
    panel.classList.add('hidden');
    iniciar();
  }

  saveBtn.addEventListener('click', () => {
    const key = document.getElementById('cfg-anthropic').value.trim();
    if (!key) { alert('La API key de Anthropic es obligatoria.'); return; }
    CONFIG.ANTHROPIC_API_KEY = key;
    CONFIG.SUPABASE_URL      = document.getElementById('cfg-sb-url').value.trim();
    CONFIG.SUPABASE_ANON_KEY = document.getElementById('cfg-sb-key').value.trim();
    panel.classList.add('hidden');
    iniciar();
  });

  sendBtn.addEventListener('click', handleSend);
  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  });
});
